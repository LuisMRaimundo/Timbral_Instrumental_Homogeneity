site_name: Homogeneity Analyser
site_description: Symbolic timbral–instrumental homogeneity (documentation)
docs_dir: docs
site_dir: site

# Unwanted Markdown under docs/ (not listed in nav) — keep the doc set small.
exclude_docs: |
  archive_legacy/**
  bibliography/**
  model_audit/**
  _*.md
  H_TIMBRAL*.md
  TECHNICAL_MANUAL_NARRATIVE_HTI_2026.md

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      # Paths in --8<-- "..." are resolved from the directory that contains mkdocs.yml (repo root).
      base_path:
        - .
      check_paths: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - README: project_readme.md
  - Quick reference: project_quick_reference.md
  - Technical manual: project_technical_manual.md
  - Current code characteristics: project_current_code_characteristics.md
  - H_TA acoustic proxy: H_TA_ACOUSTIC_PROXY.md
  - Symbolic interval-class layer: SYMBOLIC_INTERVAL_CLASS_LAYER.md
  - Metric code map: METRIC_CODE_MAP.md
  - Architecture: ARCHITECTURE.md
  - String harmonic interval reference: STRING_HARMONIC_INTERVAL_REFERENCE.md
  - Timbral affinity literature audit: TIMBRAL_AFFINITY_LITERATURE_AUDIT.md
  - Quick reference (symbolic names): QUICK_REFERENCE_SYMBOLIC_NAMES.md
