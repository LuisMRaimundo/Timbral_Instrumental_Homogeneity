name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel
      - name: Install iav dependency (Intervallic_Homogeneity)
        run: python -m pip install "git+https://github.com/LuisMRaimundo/Intervallic_Homogeneity.git"
      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run tests (exclude legacy by default)
        run: pytest -m "not legacy" -q --tb=no
